# This workflow is triggered whenever code is pushed to main,
# or whenever a Pull Request targeting main is opened or updated.

name: CI Checks

on:
  push:
    branches:
      - main
      - master
      - "release/*"     # matches release/v1.0, release/v2.3, etc.
      - "hotfix/**"     # matches hotfix/anything/including/slashes
  pull_request:
    branches:
      - main
      - master
      - "release/*"

jobs:
  test:
    # This tells GitHub which type of virtual machine to run your code on.
    # ubuntu-latest is the standard choice for most projects.
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the code from the repo onto the virtual machine.
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up the language runtime your project uses.
      # This example uses Node.js — swap this out for Python, Java, etc.
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # Step 3: Install your project's dependencies.
      - name: Install dependencies
        run: npm install

      # Step 4: Run your test suite.
      # If any test fails, this step fails, and the whole workflow fails —
      # which means GitHub will block the PR from merging.
      - name: Run tests
        run: npm test
